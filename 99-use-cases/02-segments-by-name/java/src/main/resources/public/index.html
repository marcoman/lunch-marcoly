<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Navigator — Segments by Name</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1e1e2e;
      color: #e8e8ec;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
      background: #2d2d3d;
      color: #e8e8ec;
      border: 1px solid #555;
    }
    button {
      padding: 0.5rem 1rem;
      cursor: pointer;
      background: #3d3d52;
      color: #e8e8ec;
      border: 1px solid #666;
    }
    .error { color: #ef5350; margin-bottom: 0.5rem; }
    .header { margin-bottom: 1.5rem; line-height: 1.6; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 6px;
    }
    .cell {
      width: 80px;
      height: 80px;
      border: 1px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2d2d3d;
      font-size: 1.5rem;
      user-select: none;
    }
    .cell.selected { font-weight: bold; }
    .cell.selected.highlight-yellow {
      background: #fdd835;
      color: #1a1a1a;
      border-color: #f9a825;
    }
    .cell.selected.highlight-red {
      background: #e53935;
      color: #fff;
      border-color: #c62828;
    }
    .cell.selected.highlight-blue {
      background: #1e88e5;
      color: #fff;
      border-color: #1565c0;
    }
    .cell.selected.highlight-green {
      background: #43a047;
      color: #fff;
      border-color: #2e7d32;
    }
    .cell.selected.highlight-purple {
      background: #8e24aa;
      color: #fff;
      border-color: #6a1b9a;
    }
    .hint { margin-top: 1rem; color: #aaa; font-size: 0.875rem; }
    .hidden { display: none; }
    .color-yellow { color: #fff176; }
    .color-red { color: #ef5350; }
    .color-blue { color: #64b5f6; }
    .color-green { color: #81c784; }
    .color-purple { color: #ce93d8; }
  </style>
</head>
<body>
  <section id="login-screen">
    <h1>Login</h1>
    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username" autofocus>
    <p id="login-error" class="error hidden">Username is required.</p>
    <button id="login-btn" type="button">Continue</button>
  </section>

  <section id="grid-screen" class="hidden" tabindex="0">
    <div class="header">
      <div>Name: <span id="hdr-name"></span><span id="hdr-label"></span></div>
      <div>Current position: <span id="hdr-current"></span></div>
      <div>Previous position: <span id="hdr-previous"></span></div>
    </div>
    <div id="grid" class="grid" aria-label="3 by 3 grid"></div>
    <p class="hint">Use arrow keys or WASD to move. Press L to log out, Q to quit.</p>
  </section>

  <script>
    const ROWS = ["t", "m", "b"];
    const COLS = ["l", "m", "r"];

    let username = "";
    let row = 1;
    let col = 1;
    let previous = null;
    let flags = {
      highlightColor: "none",
      segmentLabel: "",
      segmentType: "",
    };
    let flagPollTimer = null;

    function formatPos(r, c) {
      return `${ROWS[r]}/${COLS[c]}`;
    }

    function colorClass(color) {
      return color && color !== "none" ? `color-${color}` : "";
    }

    async function refreshFlags() {
      if (!username) return;
      try {
        const res = await fetch(
          `/api/flags?username=${encodeURIComponent(username)}`
        );
        if (!res.ok) return;
        flags = await res.json();
        renderGrid();
      } catch (_) {
        // Keep last-known flag values when the server is unreachable.
      }
    }

    function tryMove(dr, dc) {
      const nr = Math.max(0, Math.min(2, row + dr));
      const nc = Math.max(0, Math.min(2, col + dc));
      if (nr === row && nc === col) return false;
      previous = { row, col };
      row = nr;
      col = nc;
      return true;
    }

    function renderNameLine() {
      const nameEl = document.getElementById("hdr-name");
      const labelEl = document.getElementById("hdr-label");
      const cls = colorClass(flags.highlightColor);
      nameEl.textContent = username;
      nameEl.className = cls;
      labelEl.textContent = flags.segmentLabel ? ` ${flags.segmentLabel}` : "";
      labelEl.className = cls;
    }

    function renderGrid() {
      renderNameLine();
      document.getElementById("hdr-current").textContent = formatPos(row, col);
      document.getElementById("hdr-previous").textContent =
        previous ? formatPos(previous.row, previous.col) : "—";

      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      const highlightColor = flags.highlightColor;
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const selected = r === row && c === col;
          const cell = document.createElement("div");
          let cls = "cell";
          if (selected) {
            cls += " selected";
            if (highlightColor && highlightColor !== "none") {
              cls += ` highlight-${highlightColor}`;
            }
          }
          cell.className = cls;
          cell.textContent = selected ? "X" : "";
          grid.appendChild(cell);
        }
      }
    }

    function logout() {
      username = "";
      row = 1;
      col = 1;
      previous = null;
      flags = { highlightColor: "none", segmentLabel: "", segmentType: "" };
      if (flagPollTimer) clearInterval(flagPollTimer);
      flagPollTimer = null;

      document.getElementById("username").value = "";
      document.getElementById("login-error").classList.add("hidden");
      document.getElementById("grid-screen").classList.add("hidden");
      document.getElementById("login-screen").classList.remove("hidden");
      document.getElementById("username").focus();
    }

    function quit() {
      if (flagPollTimer) clearInterval(flagPollTimer);
      window.close();
      document.body.innerHTML = "<p>Application closed. You may close this tab.</p>";
    }

    function startGrid(name) {
      username = name;
      row = 1;
      col = 1;
      previous = null;
      flags = { highlightColor: "none", segmentLabel: "", segmentType: "" };

      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("grid-screen").classList.remove("hidden");
      document.getElementById("grid-screen").focus();

      refreshFlags();
      flagPollTimer = setInterval(refreshFlags, 3000);
      renderGrid();
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      const name = document.getElementById("username").value.trim();
      if (!name) {
        document.getElementById("login-error").classList.remove("hidden");
        return;
      }
      document.getElementById("login-error").classList.add("hidden");
      startGrid(name);
    });

    document.getElementById("username").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("login-btn").click();
      }
    });

    document.getElementById("grid-screen").addEventListener("keydown", (e) => {
      if (e.key === "q" || e.key === "Q") {
        quit();
        return;
      }
      if (e.key === "l" || e.key === "L") {
        logout();
        return;
      }
      let dr = 0;
      let dc = 0;
      if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") dr = -1;
      else if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") dr = 1;
      else if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") dc = -1;
      else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") dc = 1;
      else return;
      e.preventDefault();
      if (tryMove(dr, dc)) renderGrid();
    });
  </script>
</body>
</html>
