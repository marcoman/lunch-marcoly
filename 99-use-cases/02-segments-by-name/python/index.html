<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Navigator — Segments by Name</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #fafafa;
      color: #222;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    body.highlight-on {
      background: #1e1e2e;
      color: #e8e8ec;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    body.highlight-on input[type="text"] {
      background: #2d2d3d;
      color: #e8e8ec;
      border: 1px solid #555;
    }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    body.highlight-on button {
      background: #3d3d52;
      color: #e8e8ec;
      border: 1px solid #666;
    }
    .error { color: #c62828; margin-bottom: 0.5rem; }
    body.highlight-on .error { color: #ef5350; }
    .header { margin-bottom: 1.5rem; line-height: 1.6; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 6px;
    }
    .cell {
      width: 80px;
      height: 80px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-size: 1.5rem;
      user-select: none;
    }
    body.highlight-on .cell {
      border-color: #555;
      background: #2d2d3d;
    }
    .cell.selected { font-weight: bold; }
    .cell.selected.highlight-yellow {
      background: #fdd835;
      color: #1a1a1a;
      border-color: #f9a825;
    }
    .cell.selected.highlight-red {
      background: #e53935;
      color: #fff;
      border-color: #c62828;
    }
    .cell.selected.highlight-blue {
      background: #1e88e5;
      color: #fff;
      border-color: #1565c0;
    }
    .cell.selected.highlight-green {
      background: #43a047;
      color: #fff;
      border-color: #2e7d32;
    }
    .cell.selected.highlight-purple {
      background: #8e24aa;
      color: #fff;
      border-color: #6a1b9a;
    }
    .hint { margin-top: 1rem; color: #666; font-size: 0.875rem; }
    body.highlight-on .hint { color: #aaa; }
    .hidden { display: none; }
    .color-yellow { color: #f9a825; }
    .color-red { color: #e53935; }
    .color-blue { color: #1e88e5; }
    .color-green { color: #43a047; }
    .color-purple { color: #8e24aa; }
    body.highlight-on .color-yellow { color: #fff176; }
    body.highlight-on .color-red { color: #ef5350; }
    body.highlight-on .color-blue { color: #64b5f6; }
    body.highlight-on .color-green { color: #81c784; }
    body.highlight-on .color-purple { color: #ce93d8; }
  </style>
</head>
<body>
  <section id="login-screen">
    <h1>Login</h1>
    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username" autofocus>
    <p id="login-error" class="error hidden">Username is required.</p>
    <button id="login-btn" type="button">Continue</button>
  </section>

  <section id="grid-screen" class="hidden" tabindex="0">
    <div class="header">
      <div>Name: <span id="hdr-name"></span><span id="hdr-segment"></span></div>
      <div>Current position: <span id="hdr-current"></span></div>
      <div>Previous position: <span id="hdr-previous"></span></div>
    </div>
    <div id="grid" class="grid" aria-label="3 by 3 grid"></div>
    <p class="hint">Use arrow keys or WASD to move. Press L to log out, Q to quit.</p>
  </section>

  <script>
    const ROWS = ["t", "m", "b"];
    const COLS = ["l", "m", "r"];

    let username = "";
    let row = 1;
    let col = 1;
    let previous = null;
    let highlight = {
      highlightColor: "none",
      segmentLabel: "",
      segmentType: "",
    };

    function formatPos(r, c) {
      return `${ROWS[r]}/${COLS[c]}`;
    }

    function colorClass(color) {
      return color && color !== "none" ? `color-${color}` : "";
    }

    async function loadHighlight() {
      if (!username) return;
      try {
        const res = await fetch(
          `/api/highlight?username=${encodeURIComponent(username)}`
        );
        if (!res.ok) return;
        highlight = await res.json();
        applyTheme();
        renderGrid();
      } catch (_) {
        /* keep last-known values */
      }
    }

    function applyTheme() {
      const on = highlight.highlightColor && highlight.highlightColor !== "none";
      document.body.classList.toggle("highlight-on", on);
    }

    function tryMove(dr, dc) {
      const nr = Math.max(0, Math.min(2, row + dr));
      const nc = Math.max(0, Math.min(2, col + dc));
      if (nr === row && nc === col) return false;
      previous = { row, col };
      row = nr;
      col = nc;
      return true;
    }

    function renderNameLine() {
      const nameEl = document.getElementById("hdr-name");
      const segmentEl = document.getElementById("hdr-segment");
      const cls = colorClass(highlight.highlightColor);
      nameEl.textContent = username;
      nameEl.className = cls;
      segmentEl.textContent = highlight.segmentLabel ? ` ${highlight.segmentLabel}` : "";
      segmentEl.className = cls;
    }

    function renderGrid() {
      renderNameLine();
      document.getElementById("hdr-current").textContent = formatPos(row, col);
      document.getElementById("hdr-previous").textContent =
        previous ? formatPos(previous.row, previous.col) : "—";

      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      const highlightColor = highlight.highlightColor;
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const selected = r === row && c === col;
          const cell = document.createElement("div");
          let cls = "cell";
          if (selected) {
            cls += " selected";
            if (highlightColor && highlightColor !== "none") {
              cls += ` highlight-${highlightColor}`;
            }
          }
          cell.className = cls;
          cell.textContent = selected ? "X" : "";
          grid.appendChild(cell);
        }
      }
    }

    function logout() {
      username = "";
      row = 1;
      col = 1;
      previous = null;
      highlight = { highlightColor: "none", segmentLabel: "", segmentType: "" };
      document.body.classList.remove("highlight-on");
      document.getElementById("username").value = "";
      document.getElementById("login-error").classList.add("hidden");
      document.getElementById("grid-screen").classList.add("hidden");
      document.getElementById("login-screen").classList.remove("hidden");
      document.getElementById("username").focus();
    }

    function quit() {
      window.close();
      document.body.innerHTML = "<p>Application closed. You may close this tab.</p>";
    }

    async function startGrid(name) {
      username = name;
      row = 1;
      col = 1;
      previous = null;
      highlight = { highlightColor: "none", segmentLabel: "", segmentType: "" };
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("grid-screen").classList.remove("hidden");
      renderGrid();
      await loadHighlight();
      document.getElementById("grid-screen").focus();
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      const name = document.getElementById("username").value.trim();
      const err = document.getElementById("login-error");
      if (!name) {
        err.classList.remove("hidden");
        return;
      }
      err.classList.add("hidden");
      startGrid(name);
    });

    document.getElementById("username").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });

    document.getElementById("grid-screen").addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "q") {
        e.preventDefault();
        quit();
        return;
      }
      if (key === "l") {
        e.preventDefault();
        logout();
        return;
      }
      if (e.key === "ArrowUp" || key === "w") tryMove(-1, 0);
      else if (e.key === "ArrowDown" || key === "s") tryMove(1, 0);
      else if (e.key === "ArrowLeft" || key === "a") tryMove(0, -1);
      else if (e.key === "ArrowRight" || key === "d") tryMove(0, 1);
      else return;
      e.preventDefault();
      renderGrid();
    });
  </script>
</body>
</html>
